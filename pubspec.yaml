name: kooneex
description: "Kooneex aplicacion para gestionar viajes"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.2
  geolocator: ^12.0.0
  camera: ^0.10.5
  path_provider: ^2.1.1
  web_socket_channel: ^3.0.3
  image_picker: ^1.0.4
  flutter_map: ^8.2.2
  url_launcher: ^6.2.5
  latlong2: ^0.9.1
  sqflite: ^2.3.0
  path: ^1.8.3
  connectivity_plus: ^5.0.2
  flutter_map_tile_caching: ^10.1.1
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^21.0.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # Solo declaramos la librería aquí
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

# SECCIÓN INDEPENDIENTE (Pegada al margen izquierdo)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo_foreground.png"
  adaptive_icon_background: "assets/logo_background.png"
  adaptive_icon_foreground: "assets/logo_foreground.png"

# CONFIGURACIÓN DEL SPLASH (PANTALLA DE CARGA)
flutter_native_splash:
  color: "#FFFFFF" # Fondo blanco para Kooneex
  image: "assets/logo_foreground.png" # Tu logo centrado
  android_12:
    image: "assets/logo_foreground.png"
    color: "#FFFFFF"
    icon_background_color: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - assets/logo_blanco.png
    - assets/kooneex_logo.png
    - assets/logo_naranja.png
    - assets/logo_foreground.png
    - assets/logo_background.png

  fonts:
    - family: Poppins
      fonts:
        - asset: fonts/Poppins-Medium.ttf
    - family: Inter
      fonts:
        - asset: fonts/Inter-Regular.ttf