name: kooneex_app
description: "Proyecto Kooneex - Migración de Kivy a Flutter"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Para las peticiones a Django 
  http: ^1.1.0
  # Para guardar el token de sesión (como hacías en token.txt) 
  shared_preferences: ^2.2.2
  # Para el GPS y la Cámara que mencionaste [cite: 1]
  geolocator: ^12.0.0
  camera: ^0.10.5
  path_provider: ^2.1.1
  # Para los WebSockets de tu backend 
  web_socket_channel: ^3.0.3
  image_picker: ^1.0.4
  flutter_map: ^8.2.2
  url_launcher: ^6.2.5
  latlong2: ^0.9.1
  sqflite: ^2.3.0
  path: ^1.8.3
  connectivity_plus: ^5.0.2
  flutter_map_tile_caching: ^10.1.1 # Opcional para el caché del mapa
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Registro de Imágenes 
  assets:
    - assets/logo_blanco.png
    - assets/kooneex_logo.png
    - assets/logo_naranja.png
    - assets/moto_koonex.png

  # Registro de Fuentes (Equivalente a LabelBase.register en Kivy) 
  fonts:
    - family: Poppins
      fonts:
        - asset: fonts/Poppins-Medium.ttf
    - family: Inter
      fonts:
        - asset: fonts/Inter-Regular.ttf
